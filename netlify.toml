[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888

# Vite special paths - must exclude from SPA catch-all
[[redirects]]
  from = "/@*"
  to = "/@:splat"
  status = 200

# Vite dependency paths (some setups still use this)
[[redirects]]
  from = "/node_modules/*"
  to = "/node_modules/:splat"
  status = 200

[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200

# SPA catch-all (LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
